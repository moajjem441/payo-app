<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Log in</title>

    <!-- tailwind+ daisi ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">


<!-- fonts-awesome cdn --><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
        font-family: "Outfit", sans-serif;
    }
</style>

</head>

<body>
  
  <section  class="bg-base-200 h-screen w-md mx-auto ">

      <div class="logo flex justify-center items-center pt-32 pb-8">
      <img src="./Payoo/assets/Logo-full.png" alt="">
    </div>

    <div class="card-container w-11/12 mx-auto">

         <div class="card bg-base-100  rounded-[30px] p-2">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-[15px] font-bold text-neutral">Mobile Number</label>
          <input id="mobile-number" type="number" class="input bg-base-200 w-full rounded-full p-5 text-[15px] " placeholder="Enter Your Mobile number" minlength="11" maxlength="11"/>
          <br>

          <label class="label text-[15px] font-bold text-neutral">4 Digit Pin </label>
          <input id="pin" type="password" class="input bg-base-200 w-full rounded-full p-5 text-[15px]" placeholder="Enter Your 4 Digit pin" />

          <button id="login-btn" class="btn btn-primary mt-4 w-full rounded-full p-5 text-xl">Login</button>
        </fieldset>
      </div>
    </div>

    </div>



  </section>




    <script src="./script/login.js"></script>
</body>

</html>
